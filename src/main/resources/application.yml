server:
  port: 8080

spring:
  application:
    name: dorm-repair-management-system
  datasource:
    # 当前小组开发阶段直接写死本地数据库配置，减少同学初次拉项目时的理解成本。
    url: jdbc:mysql://127.0.0.1:3306/dorm_repair_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    # 起步阶段先用 update 方便联调；正式落库后建议切到 Flyway/Liquibase 管理。
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
